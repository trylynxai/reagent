apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-reagent-server
  labels:
    app: reagent-server
    release: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: http
  selector:
    app: reagent-server
    release: {{ .Release.Name }}
