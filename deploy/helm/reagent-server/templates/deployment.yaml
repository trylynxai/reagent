apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-reagent-server
  labels:
    app: reagent-server
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: reagent-server
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: reagent-server
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: reagent-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: REAGENT_API_KEYS
              value: {{ .Values.apiKeys | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-reagent-data
          {{- else }}
          emptyDir: {}
          {{- end }}
